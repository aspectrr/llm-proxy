app = "llm-gateway-cpfeifer"
primary_region = "ord" # Chicago is closest to Indy for low latency

[mounts]
  source = "bifrost_data"
  destination = "/var/lib/tailscale"

[env]
  # Point Bifrost to use the SQLite DB on the mounted volume
  BIFROST_DB_URL = "sqlite:///var/lib/tailscale/config.db"
  BIFROST_HOST = "0.0.0.0"
  BIFROST_PORT = "8080"

[vm]
  memory = "2gb"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [services.http_options]
    idle_timeout = "120s"
  [services.http_options.response]
    timeout = "120s"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
